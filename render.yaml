services:
  - type: web
    name: navya-local-dev-server
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn services.testing_mesh.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: RENDER_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
